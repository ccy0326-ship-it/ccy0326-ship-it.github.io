<!DOCTYPE html>
<html>
<head>
    <title>Vote</title>

    <style>
        html { overflow-y: scroll; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #222;
        }

        /* 🔷 Content */
        .content {
            max-width: 900px;
            margin: 180px auto 50px;
            padding: 0 20px;
        }

        .title {
            text-align: center;
            font-size: 36px;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* 🔥 題目（動畫修正版） */
        .question {
            padding: 25px 0;
            border-bottom: 1px solid #ccc;
            font-size: 18px;
            cursor: pointer;

            opacity: 0;
            transform: translateX(-80px);

            animation: slideIn 0.5s ease forwards;
            animation-delay: var(--delay); /* ⭐ 核心修正 */
        }

        .question:hover {
            transform: translateX(10px);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

    </style>
</head>

<body>

<!-- 🔷 navbar -->
<div id="navbar"></div>

<!-- 🔷 Content -->
<div class="content">

    <div class="title">Vote</div>

    <div class="question" style="--delay:0.1s" onclick="location.href='q1.html'">
        1. Biggest problem in education?
    </div>

    <div class="question" style="--delay:0.2s" onclick="location.href='q2.html'">
        2. Most important factor?
    </div>

    <div class="question" style="--delay:0.3s" onclick="location.href='q3.html'">
        3. Who faces most difficulty?
    </div>

    <div class="question" style="--delay:0.4s" onclick="location.href='q4.html'">
        4. Best solution?
    </div>

    <div class="question" style="--delay:0.5s" onclick="location.href='q5.html'">
        5. Biggest barrier?
    </div>

    <div class="question" style="--delay:0.6s" onclick="location.href='q6.html'">
        6. What helps learning?
    </div>

    <div class="question" style="--delay:0.7s" onclick="location.href='q7.html'">
        7. Government focus?
    </div>

    <div class="question" style="--delay:0.8s" onclick="location.href='q8.html'">
        8. Role of technology?
    </div>

    <div class="question" style="--delay:0.9s" onclick="location.href='q9.html'">
        9. Best learning type?
    </div>

    <div class="question" style="--delay:1s" onclick="location.href='q10.html'">
        10. Why is education important?
    </div>

</div>

<!-- 🔷 JS -->
<script>
fetch("navbar.html")
.then(res => res.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});

function openMenu() {
    document.getElementById("sideMenu").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeMenu() {
    document.getElementById("sideMenu").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
