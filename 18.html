<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exercise</title>

<style>
body {
  background-color: #f2f2f2;
  font-family: "Times New Roman", serif;
}

.box {
  width: 650px;
  margin: 50px auto;
  padding: 20px;
  background-color: #fdfdfd;
  box-shadow: 8px 8px 10px gray;
}

h1 {
  border-top: 4px solid black;
  padding-top: 10px;
  color: #b33;
  font-weight: bold;
}

h2 {
  border: 3px solid #d4d400;
  padding: 8px;
  font-style: italic;
  margin-top: 20px;
}

h3 {
  text-align: right;
  text-decoration: underline;
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="box">
  <h1>This is heading 1</h1>
  <h2>This is heading 2</h2>
  <h3>This is heading 3</h3>
</div>

</body>
</html>
