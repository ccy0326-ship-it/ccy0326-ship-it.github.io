<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Image Styling Final</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 40px;
    background: #f5f5f5;
}

/* 主容器 */
.container {
    display: flex;
    justify-content: center; /* ⭐ 改這個 */
    align-items: flex-start;
    position: relative;
    max-width: 1000px;
    margin: auto;
}

/* 左右圖片（關鍵修改） */
.img-box {
    width: 32%; /* ⭐ 原本33 → 32 讓空間變小 */
    height: 300px;
    overflow: hidden;
}

/* ⭐ 讓圖片往中間靠 */
.left {
    margin-right: 10px;
}

.right {
    margin-left: 10px;
}

/* 左：不變形 + 圓角 */
.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
}

/* 右：故意變形 */
.right img {
    width: 100%;
    height: 100%;
}

/* 中間圓形 */
.circle {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);

    width: 150px;
    height: 150px;
    border-radius: 50%;
    overflow: hidden;

    border: 6px solid white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.25);
    background: white;
    z-index: 10;
}

.circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 📱 RWD */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    .img-box {
        width: 80%;
    }

    .circle {
        position: static;
        transform: none;
    }
}
</style>

</head>

<body>

<div class="container">

    <div class="img-box left">
        <img src="https://picsum.photos/id/1015/600/400">
    </div>

    <div class="circle">
        <img src="https://picsum.photos/id/1016/400/400">
    </div>

    <div class="img-box right">
        <img src="https://picsum.photos/id/1015/600/400">
    </div>

</div>

</body>
</html>
