<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Image Styling</title>

<style>
body {
    margin: 0;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #f5f5f5;
}

/* 外層容器 */
.container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
}

/* 左右圖片 */
.img-box {
    width: 33%;
    height: 300px;
    overflow: hidden;
}

/* 左邊：圓角 + 不變形 */
.left-img img {
    width: 100%;
    height: 100%;
    border-radius: 18px;
    object-fit: cover; /* 不變形 */
}

/* 中間圓形圖片 */
.circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    overflow: hidden;
    border: 5px solid white;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 右邊：允許變形（故意不加 object-fit） */
.right-img img {
    width: 100%;
    height: 100%;
    /* 沒有 object-fit → distortion */
}
</style>

</head>

<body>

<div class="container">

    <!-- 左 -->
    <div class="img-box left-img">
        <img src="https://picsum.photos/id/1015/600/400">
    </div>

    <!-- 中 -->
    <div class="circle">
        <img src="https://picsum.photos/id/1016/400/400">
    </div>

    <!-- 右 -->
    <div class="img-box right-img">
        <img src="https://picsum.photos/id/1015/600/400">
    </div>

</div>

</body>
</html>
