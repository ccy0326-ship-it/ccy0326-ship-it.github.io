<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Image Styling Final</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 40px;
    background: #f5f5f5;
}

/* 主容器 */
.container {
    display: flex;
    justify-content: space-between;
    align-items: flex-start; /* ⭐ 保證全部從頂開始 */
    position: relative;
    max-width: 1000px;
    margin: auto;
}

/* 左右圖片 */
.img-box {
    width: 33%;
    height: 300px;
    overflow: hidden;
}

/* 左：不變形 + 圓角 */
.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
}

/* 右：故意變形 */
.right img {
    width: 100%;
    height: 100%;
}

/* ⭐ 中間圓形（頂對齊版本） */
.circle {
    position: absolute;
    top: 0; /* ⭐ 跟左右圖片頂對齊 */
    left: 50%;
    transform: translateX(-50%);

    width: 150px;
    height: 150px;
    border-radius: 50%;
    overflow: hidden;

    border: 3px solid white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.25);
    background: white;
}

.circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 📱 RWD（手機） */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }

    .img-box {
        width: 80%;
    }

    .circle {
        position: static;
        transform: none;
    }
}
</style>

</head>

<body>

<div class="container">

    <!-- 左 -->
    <div class="img-box left">
        <img src="https://picsum.photos/id/1015/600/400">
    </div>

    <!-- 中間圓 -->
    <div class="circle">
        <img src="https://picsum.photos/id/1016/400/400">
    </div>

    <!-- 右 -->
    <div class="img-box right">
        <img src="https://picsum.photos/id/1015/600/400">
    </div>

</div>

</body>
</html>
