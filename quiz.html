<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>

<style>
html{overflow-y:scroll;}
body{margin:0;font-family:Arial;background:#f4f9f9;}

.header,.navbar{background:white;border-bottom:2px solid black;}
.header{position:fixed;top:0;width:100%;height:80px;z-index:1000;}
.header-inner{max-width:1000px;margin:auto;height:100%;display:flex;align-items:center;justify-content:center;position:relative;font-size:36px;}
.menu-btn{position:absolute;left:20px;font-size:28px;cursor:pointer;}

.navbar{position:fixed;top:80px;width:100%;height:60px;}
.nav-inner{max-width:1000px;margin:auto;height:100%;display:flex;align-items:center;justify-content:center;gap:60px;}
.nav-link{color:black;text-decoration:none;}
.nav-link:hover{color:red;}

.side-menu{position:fixed;left:-260px;top:0;width:260px;height:100%;background:white;box-shadow:2px 0 10px rgba(0,0,0,.2);padding-top:80px;transition:.3s;}
.side-menu.active{left:0;}

#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,.3);opacity:0;visibility:hidden;transition:.3s;}
#overlay.active{opacity:1;visibility:visible;}

.content{margin:160px auto;max-width:1000px;padding-left:20px;}

.question{
margin:15px 0;
font-size:20px;
cursor:pointer;
opacity:0;
transform:translateX(-100px);
animation:slideIn .6s forwards;
}

.question:nth-child(1){animation-delay:.1s;}
.question:nth-child(2){animation-delay:.2s;}
.question:nth-child(3){animation-delay:.3s;}

.question:hover{color:red;transform:translateX(10px);}

@keyframes slideIn{
to{opacity:1;transform:translateX(0);}
}
</style>
</head>

<body>

<div id="navbar"></div>

<div class="content">
<div class="question">1. Which is a key goal of SDG 4?</div>
<div class="question">2. What is a barrier to education?</div>
<div class="question">3. Why is education important?</div>
</div>

<script>
fetch("navbar.html").then(r=>r.text()).then(d=>{
document.getElementById("navbar").innerHTML=d;
});

function openMenu(){sideMenu.classList.add("active");overlay.classList.add("active");}
function closeMenu(){sideMenu.classList.remove("active");overlay.classList.remove("active");}
</script>

</body>
</html>
