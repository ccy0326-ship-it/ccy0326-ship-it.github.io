<!DOCTYPE html>
<html>
<head>
    <title>Vote Q1</title>

    <!-- ⭐ 共用 navbar CSS -->
    <link rel="stylesheet" href="navbar.css">

    <style>
        html { overflow-y: scroll; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #222;
        }

        /* 🔷 這頁自己的內容 */
        .content {
            max-width: 900px;
            margin: 180px auto 50px;
            padding: 0 20px;
            text-align: center;
        }

        .title {
            font-size: 28px;
            margin-bottom: 40px;
        }

        /* 🔥 選項 */
        .option {
            padding: 20px 0;
            border-bottom: 1px solid #ccc;
            font-size: 18px;
            cursor: pointer;

            opacity: 0;
            transform: translateX(-60px);
            animation: slideIn 0.4s forwards;
        }

        .option:nth-child(2){animation-delay:0.1s;}
        .option:nth-child(3){animation-delay:0.2s;}
        .option:nth-child(4){animation-delay:0.3s;}

        .option:hover {
            transform: translateX(10px);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 🔷 結果 */
        #result {
            margin-top: 40px;
            font-size: 16px;
            color: #555;
        }

        /* 🔙 返回 */
        .back {
            display: inline-block;
            margin-top: 40px;
            font-size: 14px;
            color: #666;
            text-decoration: none;
        }

        .back:hover {
            color: black;
        }

    </style>

    <script>
        let votes = JSON.parse(localStorage.getItem("q1")) || {
            a: 0,
            b: 0,
            c: 0
        };

        function vote(option) {
            votes[option]++;
            localStorage.setItem("q1", JSON.stringify(votes));
            showResult();
        }

        function showResult() {
            let total = votes.a + votes.b + votes.c;

            let a = total ? (votes.a/total*100).toFixed(1) : 0;
            let b = total ? (votes.b/total*100).toFixed(1) : 0;
            let c = total ? (votes.c/total*100).toFixed(1) : 0;

            document.getElementById("result").innerHTML =
                "Poverty: " + votes.a + " (" + a + "%)<br>" +
                "Resources: " + votes.b + " (" + b + "%)<br>" +
                "Gender inequality: " + votes.c + " (" + c + "%)";
        }

        window.onload = showResult;
    </script>
</head>

<body>

<!-- 🔷 共用 navbar -->
<div id="navbar"></div>

<!-- 🔷 Content -->
<div class="content">

    <div class="title">What is the biggest problem in global education?</div>

    <div class="option" onclick="vote('a')">Poverty</div>
    <div class="option" onclick="vote('b')">Lack of resources</div>
    <div class="option" onclick="vote('c')">Gender inequality</div>

    <div id="result"></div>

    <a class="back" href="vote.html">← Back</a>

</div>

<!-- 🔷 JS（共用 navbar） -->
<script>
fetch("navbar.html")
.then(res => res.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});

function openMenu() {
    document.getElementById("sideMenu").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeMenu() {
    document.getElementById("sideMenu").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
