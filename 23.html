<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button Interaction Example</title>

<style>
    body {
        font-family: Roboto, sans-serif;
        text-align: center;
        padding: 20px;
    }

    .container {
        width: 500px;
        margin: auto;
    }

    img {
        width: 100%;
        height: auto;
    }

    /* 按鈕設計 */
    .btn {
        margin-top: 10px;
        height: 22px;
        padding: 0 10px;
        border-radius: 8px;
        border: 1px solid #2f2f2f;
        background-color: #ffffff;
        font-size: 13px;
        cursor: pointer;
    }

    .btn:hover {
        background-color: #f0f0f0;
    }

    /* 詳細資訊區塊 */
    .details {
        margin-top: 15px;
        display: none;
        color: #707070;
        font-size: 13px;
        border-top: 1px solid #ccc;
        padding-top: 10px;
    }
</style>
</head>

<body>

<div class="container">
    <img src="https://picsum.photos/500/300" alt="sample image">

    <button class="btn" onclick="showDetails()">
        Show Details
    </button>

    <div id="details" class="details">
        <p>This is the detailed information about the image.</p>
        <p>You can add description, metadata, or anything here.</p>
    </div>
</div>

<script>
function showDetails() {
    const detail = document.getElementById("details");

    if (detail.style.display === "none") {
        detail.style.display = "block";
    } else {
        detail.style.display = "none";
    }
}
</script>

</body>
</html>
