<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UI Example</title>

<style>
body {
    font-family: Roboto, sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px;
}

/* 外框 */
.container {
    width: 500px;
}

/* 圖片區塊（關鍵：relative） */
.image-box {
    position: relative;
}

/* 圖片 */
.image-box img {
    width: 100%;
    display: block;
}

/* 按鈕（右上角） */
.btn {
    position: absolute;
    top: 10px;
    right: 10px;

    height: 22px;
    padding: 0 10px;
    border-radius: 8px;
    border: 1px solid #2f2f2f;
    background-color: #ffffff;

    font-size: 13px;
    cursor: pointer;
}

.btn:hover {
    background-color: #f0f0f0;
}

/* 詳細資訊 */
.details {
    margin-top: 10px;
    display: none;
    font-size: 13px;
    color: #707070;
    border-top: 1px solid #ccc;
    padding-top: 10px;
}
</style>
</head>

<body>

<div class="container">

    <div class="image-box">
        <img src="https://picsum.photos/500/300">

        <button class="btn" onclick="toggleDetails()">
            查看資訊
        </button>
    </div>

    <div id="details" class="details">
        <p>日期：2017/10/12</p>
        <p>檔名：image.jpg</p>
        <p>大小：400KB</p>
    </div>

</div>

<script>
function toggleDetails() {
    const d = document.getElementById("details");
    d.style.display = (d.style.display === "block") ? "none" : "block";
}
</script>

</body>
</html>
