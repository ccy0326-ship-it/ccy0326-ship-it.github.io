<!DOCTYPE html>
<html>
<head>
    <title>Region Info</title>

    <style>
        html { overflow-y: scroll; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #222;
        }

        /* 🔷 Content（⭐ 加padding避免貼邊） */
        .content {
            max-width: 900px;
            margin: 180px auto 50px;
            padding: 0 20px;   /* ⭐ 關鍵 */
            text-align: center;
        }

        .title {
            font-size: 36px;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* 🌍 區域卡片 */
        .map {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .region {
            padding: 40px;
            border: 1px solid #ccc;
            cursor: pointer;
            transition: 0.3s;

            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.5s forwards;
        }

        .region:nth-child(1){animation-delay:0.1s;}
        .region:nth-child(2){animation-delay:0.2s;}
        .region:nth-child(3){animation-delay:0.3s;}
        .region:nth-child(4){animation-delay:0.4s;}
        .region:nth-child(5){animation-delay:0.5s;}
        .region:nth-child(6){animation-delay:0.6s;}

        .region:hover {
            transform: translateY(-8px);
            border-color: black;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 🔷 顯示資訊 */
        #info {
            margin-top: 40px;
            font-size: 16px;
            color: #555;
            line-height: 1.6;
        }

        /* 🔥 側邊選單（統一版） */
        .side-menu {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            padding-top: 80px;
            transition: 0.3s;
            z-index: 2000;
        }

        .side-menu.active { left: 0; }

        .side-header {
            padding: 0 30px;   /* ⭐ Menu不貼邊 */
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .side-menu a {
            display: block;
            padding: 15px 30px;   /* ⭐ 對齊 */
            text-decoration: none;
            color: black;
        }

        .side-menu a:hover {
            background: #f0f0f0;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
        }

        /* 🔳 遮罩 */
        #overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 1500;
        }

        #overlay.active {
            opacity: 1;
            visibility: visible;
        }

    </style>

    <script>
        function showInfo(region) {
            let text = document.getElementById("info");

            if (region === "north_america") {
                text.innerHTML = "North America: Advanced education systems but inequality still exists.";
            } 
            else if (region === "south_america") {
                text.innerHTML = "South America: Some areas lack resources and access.";
            } 
            else if (region === "europe") {
                text.innerHTML = "Europe: High-quality and accessible education.";
            } 
            else if (region === "africa") {
                text.innerHTML = "Africa: Many children cannot access basic education.";
            } 
            else if (region === "asia") {
                text.innerHTML = "Asia: Unequal education between urban and rural areas.";
            } 
            else if (region === "oceania") {
                text.innerHTML = "Oceania: Remote areas face challenges in education access.";
            }
        }
    </script>
</head>

<body>

<!-- 🔷 navbar -->
<div id="navbar"></div>

<!-- 🔷 Content -->
<div class="content">

    <div class="title">Region Info</div>

    <div class="map">
        <div class="region" onclick="showInfo('north_america')">North America</div>
        <div class="region" onclick="showInfo('south_america')">South America</div>
        <div class="region" onclick="showInfo('europe')">Europe</div>
        <div class="region" onclick="showInfo('africa')">Africa</div>
        <div class="region" onclick="showInfo('asia')">Asia</div>
        <div class="region" onclick="showInfo('oceania')">Oceania</div>
    </div>

    <p id="info">Click a region to see education information</p>

</div>

<!-- 🔷 JS -->
<script>
fetch("navbar.html")
.then(res => res.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});

function openMenu() {
    document.getElementById("sideMenu").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeMenu() {
    document.getElementById("sideMenu").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
