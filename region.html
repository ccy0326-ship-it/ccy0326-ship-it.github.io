<!DOCTYPE html>
<html>
<head>
<title>Region</title>

<style>
html{overflow-y:scroll;}
body{margin:0;font-family:Arial;background:#f4f9f9;}

.header,.navbar{background:white;border-bottom:2px solid black;}
.header{position:fixed;top:0;width:100%;height:80px;}
.header-inner{max-width:1000px;margin:auto;height:100%;display:flex;align-items:center;justify-content:center;position:relative;font-size:36px;}
.menu-btn{position:absolute;left:20px;font-size:28px;}

.navbar{position:fixed;top:80px;width:100%;height:60px;}
.nav-inner{max-width:1000px;margin:auto;height:100%;display:flex;justify-content:center;align-items:center;gap:60px;}

.content{margin:160px auto;max-width:1000px;text-align:center;}

.map{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:30px;}

.region{background:#2a9d8f;color:white;padding:40px;border-radius:10px;cursor:pointer;transition:.3s;}
.region:hover{transform:translateY(-5px);}
</style>
</head>

<body>

<div id="navbar"></div>

<div class="content">
<h1>Choose Region</h1>

<div class="map">
<div class="region">Asia</div>
<div class="region">Africa</div>
<div class="region">Europe</div>
</div>

</div>

<script>
fetch("navbar.html").then(r=>r.text()).then(d=>{
document.getElementById("navbar").innerHTML=d;
});
</script>

</body>
</html>
