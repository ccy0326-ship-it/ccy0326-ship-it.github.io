<!DOCTYPE html>
<html>
<head>
    <title>Region Info</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f4f9f9;
        }

        h1 {
            margin-top: 30px;
            color: #264653;
        }

        /* 按鈕區排版 */
        .button-container {
            margin-top: 20px;
        }

        .btn {
            margin: 10px;
            padding: 12px 18px;
            border: none;
            background-color: #2a9d8f;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #21867a;
            transform: scale(1.05);
        }

        #info {
            margin-top: 25px;
            font-size: 18px;
            color: #333;
        }

        a {
            display: block;
            margin-top: 30px;
        }
    </style>

    <script>
        function showInfo(region) {
            let text = document.getElementById("info");

            if (region === "north_america") {
                text.innerHTML = "North America: Advanced education systems but inequality still exists.";
            } 
            else if (region === "south_america") {
                text.innerHTML = "South America: Some regions lack resources and access.";
            } 
            else if (region === "europe") {
                text.innerHTML = "Europe: High-quality and accessible education.";
            } 
            else if (region === "africa") {
                text.innerHTML = "Africa: Many children cannot access basic education.";
            } 
            else if (region === "asia") {
                text.innerHTML = "Asia: Unequal education between urban and rural areas.";
            } 
            else if (region === "oceania") {
                text.innerHTML = "Oceania: Remote areas face challenges in education access.";
            }
        }
    </script>
</head>

<body>

<h1>Choose a Continent</h1>

<div class="button-container">
    <button class="btn" onclick="showInfo('north_america')">North America</button>
    <button class="btn" onclick="showInfo('south_america')">South America</button>
    <button class="btn" onclick="showInfo('europe')">Europe</button>
    <button class="btn" onclick="showInfo('africa')">Africa</button>
    <button class="btn" onclick="showInfo('asia')">Asia</button>
    <button class="btn" onclick="showInfo('oceania')">Oceania</button>
</div>

<p id="info">Click a continent to see education information</p>

<a href="Final.html">⬅ Back to Home</a>

</body>
</html>
