<!DOCTYPE html>
<html>
<head>
    <title>Region Map</title>

    <style>
        html { overflow-y: scroll; }

        body {
            margin: 0;
            font-family: Arial;
            background: #f4f9f9;
        }

        /* 🔷 Header */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: white;
            border-bottom: 2px solid black;
            z-index: 1000;
        }

        .header-inner {
            max-width: 1000px;
            margin: auto;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 36px;
        }

        /* ☰ 按鈕 */
        .menu-btn {
            position: absolute;
            left: 20px;
            font-size: 28px;
            cursor: pointer;
        }

        /* 🔷 Navbar */
        .navbar {
            position: fixed;
            top: 80px;
            width: 100%;
            height: 60px;
            background: white;
            border-bottom: 2px solid black;
            z-index: 999;
        }

        .nav-inner {
            max-width: 1000px;
            margin: auto;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
        }

        .nav-link {
            text-decoration: none;
            color: black;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .nav-link:hover { color: red; }

        .active {
            color: red;
            font-weight: bold;
        }

        /* 🔷 Content */
        .content {
            max-width: 1000px;
            margin: 160px auto 0;
            text-align: center;
        }

        /* 🌍 地圖 */
        .map {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 40px;
        }

        .region {
            padding: 40px;
            background: #2a9d8f;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;

            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.6s forwards;
        }

        .region:nth-child(1) { animation-delay: 0.1s; }
        .region:nth-child(2) { animation-delay: 0.2s; }
        .region:nth-child(3) { animation-delay: 0.3s; }
        .region:nth-child(4) { animation-delay: 0.4s; }
        .region:nth-child(5) { animation-delay: 0.5s; }
        .region:nth-child(6) { animation-delay: 0.6s; }

        .region:hover {
            background: #21867a;
            transform: translateY(-8px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #info {
            margin-top: 30px;
            font-size: 18px;
        }

        /* 🔥 側邊選單 */
        .side-menu {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            padding-top: 80px;
            transition: 0.3s;
            z-index: 2000;
        }

        .side-menu a {
            display: block;
            padding: 15px 25px;
            text-decoration: none;
            color: black;
        }

        .side-menu a:hover {
            background: #f0f0f0;
            color: red;
        }

        .side-menu.active { left: 0; }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
        }

        #overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 1500;
        }

        #overlay.active {
            opacity: 1;
            visibility: visible;
        }

    </style>

    <script>
        function showInfo(region) {
            let text = document.getElementById("info");

            if (region === "north_america") {
                text.innerHTML = "North America: Advanced systems but inequality exists.";
            } 
            else if (region === "south_america") {
                text.innerHTML = "South America: Some areas lack resources.";
            } 
            else if (region === "europe") {
                text.innerHTML = "Europe: High-quality education access.";
            } 
            else if (region === "africa") {
                text.innerHTML = "Africa: Limited access to education.";
            } 
            else if (region === "asia") {
                text.innerHTML = "Asia: Urban-rural education gap.";
            } 
            else if (region === "oceania") {
                text.innerHTML = "Oceania: Remote education challenges.";
            }
        }

        function openMenu() {
            document.getElementById("sideMenu").classList.add("active");
            document.getElementById("overlay").classList.add("active");
        }

        function closeMenu() {
            document.getElementById("sideMenu").classList.remove("active");
            document.getElementById("overlay").classList.remove("active");
        }
    </script>
</head>

<body>

<!-- Header -->
<div class="header">
    <div class="header-inner">
        <div class="menu-btn" onclick="openMenu()">☰</div>
        SG4
    </div>
</div>

<!-- Navbar -->
<div class="navbar">
    <div class="nav-inner">
        <a class="nav-link" href="Final.html">Information</a>
        <a class="nav-link" href="quiz.html">Quiz</a>
        <a class="nav-link active" href="region.html">Region Info</a>
        <a class="nav-link" href="vote.html">Vote</a>
    </div>
</div>

<!-- 側邊選單 -->
<div id="sideMenu" class="side-menu">
    <div class="close-btn" onclick="closeMenu()">✖</div>
    <a href="Final.html">Information</a>
    <a href="quiz.html">Quiz</a>
    <a href="region.html">Region Info</a>
    <a href="vote.html">Vote</a>
</div>

<div id="overlay" onclick="closeMenu()"></div>

<!-- Content -->
<div class="content">

    <h1>Click a Region</h1>

    <div class="map">
        <div class="region" onclick="showInfo('north_america')">North America</div>
        <div class="region" onclick="showInfo('south_america')">South America</div>
        <div class="region" onclick="showInfo('europe')">Europe</div>
        <div class="region" onclick="showInfo('africa')">Africa</div>
        <div class="region" onclick="showInfo('asia')">Asia</div>
        <div class="region" onclick="showInfo('oceania')">Oceania</div>
    </div>

    <p id="info">Click a region to see education info</p>

</div>

</body>
</html>
