<!DOCTYPE html>
<html>
<head>
    <title>Region Info</title>

    <style>
        html { overflow-y: scroll; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #222;
        }

        /* 🔷 Content */
        .content {
            max-width: 900px;
            margin: 180px auto 50px;
            padding: 0 20px;
            text-align: center;
        }

        .title {
            font-size: 36px;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* 🌍 卡片 */
        .map {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .region {
            padding: 40px;
            border: 1px solid #ccc;
            cursor: pointer;
            transition: 0.3s;

            opacity: 0;
            transform: translateY(30px);

            animation: fadeUp 0.5s ease forwards;
            animation-delay: var(--delay);
        }

        .region:hover {
            transform: translateY(-8px);
            border-color: black;
        }

        /* 🔷 info（⭐ 新增動畫） */
        #info {
            margin-top: 40px;
            font-size: 16px;
            color: #555;
            line-height: 1.6;

            opacity: 0;
            transform: translateY(30px);

            animation: fadeUp 0.5s ease forwards;
            animation-delay: var(--delay);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>

    <script>
        function showInfo(region) {
            let text = document.getElementById("info");

            if (region === "north_america") {
                text.innerHTML = "North America: Advanced education systems but inequality still exists.";
            } 
            else if (region === "south_america") {
                text.innerHTML = "South America: Some areas lack resources and access.";
            } 
            else if (region === "europe") {
                text.innerHTML = "Europe: High-quality and accessible education.";
            } 
            else if (region === "africa") {
                text.innerHTML = "Africa: Many children cannot access basic education.";
            } 
            else if (region === "asia") {
                text.innerHTML = "Asia: Unequal education between urban and rural areas.";
            } 
            else if (region === "oceania") {
                text.innerHTML = "Oceania: Remote areas face challenges in education access.";
            }
        }
    </script>
</head>

<body>

<!-- 🔷 navbar -->
<div id="navbar"></div>

<!-- 🔷 Content -->
<div class="content">

    <div class="title">Region Info</div>

    <div class="map">
        <div class="region" style="--delay:0.1s" onclick="showInfo('north_america')">North America</div>
        <div class="region" style="--delay:0.2s" onclick="showInfo('south_america')">South America</div>
        <div class="region" style="--delay:0.3s" onclick="showInfo('europe')">Europe</div>
        <div class="region" style="--delay:0.4s" onclick="showInfo('africa')">Africa</div>
        <div class="region" style="--delay:0.5s" onclick="showInfo('asia')">Asia</div>
        <div class="region" style="--delay:0.6s" onclick="showInfo('oceania')">Oceania</div>
    </div>

    <!-- ⭐ 最後一句也會延遲出現 -->
    <p id="info" style="--delay:0.7s">
        Click a region to see education information
    </p>

</div>

<!-- 🔷 JS -->
<script>
fetch("navbar.html")
.then(res => res.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});

function openMenu() {
    document.getElementById("sideMenu").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeMenu() {
    document.getElementById("sideMenu").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
