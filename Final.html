<!DOCTYPE html>
<html>
<head>
    <title>SDG 4 Website</title>

    <style>
        html {
            overflow-y: scroll;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f9f9;
        }

        /* 🔷 Header（固定高度） */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: white;
            border-bottom: 2px solid black;
            z-index: 1000;
        }

        .header-inner {
            max-width: 1000px;
            margin: auto;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        /* 🔷 Navbar（固定高度） */
        .navbar {
            position: fixed;
            top: 80px;
            width: 100%;
            height: 60px;
            background: white;
            border-bottom: 2px solid black;
            z-index: 999;
        }

        .nav-inner {
            max-width: 1000px;
            margin: auto;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
        }

        .nav-link {
            text-decoration: none;
            color: black;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        /* ❗ 關鍵：不改大小 → 完全不晃 */
        .nav-link:hover {
            color: red;
        }

        .active {
            color: red;
            font-weight: bold;
        }

        /* 🔷 內容 */
        .content {
            max-width: 1000px;
            margin: 160px auto 0;
            text-align: center;
        }

        .content h1 {
            margin-top: 50px;
        }

    </style>
</head>

<body>

<!-- Header -->
<div class="header">
    <div class="header-inner">SG4</div>
</div>

<!-- Navbar -->
<div class="navbar">
    <div class="nav-inner">
        <a class="nav-link active" href="Final.html">Information</a>
        <a class="nav-link" href="quiz.html">Quiz</a>
        <a class="nav-link" href="region.html">Region Info</a>
        <a class="nav-link" href="vote.html">Vote</a>
    </div>
</div>

<!-- Content -->
<div class="content">
    <h1>Welcome to SDG 4</h1>
    <p>Explore education issues around the world.</p>
</div>

</body>
</html>
