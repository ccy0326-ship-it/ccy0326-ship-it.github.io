<!DOCTYPE html>
<html>
<head>
<title>SDG 4</title>

<style>
html { overflow-y: scroll; }
body { margin:0; font-family:Arial; background:#f4f9f9; }

/* 共用 */
.header,.navbar{background:white;border-bottom:2px solid black;}
.header{position:fixed;top:0;width:100%;height:80px;z-index:1000;}
.header-inner{max-width:1000px;margin:auto;height:100%;display:flex;align-items:center;justify-content:center;position:relative;font-size:36px;}
.menu-btn{position:absolute;left:20px;font-size:28px;cursor:pointer;}

.navbar{position:fixed;top:80px;width:100%;height:60px;z-index:999;}
.nav-inner{max-width:1000px;margin:auto;height:100%;display:flex;align-items:center;justify-content:center;gap:60px;}
.nav-link{color:black;text-decoration:none;font-size:18px;}
.nav-link:hover{color:red;}
.active{color:red;font-weight:bold;}

.side-menu{position:fixed;left:-260px;top:0;width:260px;height:100%;background:white;box-shadow:2px 0 10px rgba(0,0,0,.2);padding-top:80px;transition:.3s;z-index:2000;}
.side-menu.active{left:0;}
.side-menu a{display:block;padding:15px 25px;color:black;text-decoration:none;}
.side-menu a:hover{background:#f0f0f0;color:red;}
.close-btn{position:absolute;top:20px;right:20px;cursor:pointer;}

#overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,.3);opacity:0;visibility:hidden;transition:.3s;z-index:1500;}
#overlay.active{opacity:1;visibility:visible;}

.content{max-width:1000px;margin:160px auto;text-align:center;}
</style>
</head>

<body>

<div id="navbar"></div>

<div class="content">
<h1>Welcome to SDG 4</h1>
<p>Explore education issues around the world</p>
</div>

<script>
fetch("navbar.html").then(r=>r.text()).then(d=>{
document.getElementById("navbar").innerHTML=d;
});

function openMenu(){
sideMenu.classList.add("active");
overlay.classList.add("active");
}
function closeMenu(){
sideMenu.classList.remove("active");
overlay.classList.remove("active");
}
</script>

</body>
</html>
