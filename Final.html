<!DOCTYPE html>
<html>
<head>
    <title>SDG 4 Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f9f9;
        }

        /* 🔷 標題區 */
        .header {
            text-align: center;
            padding: 20px;
            font-size: 36px;
            border-bottom: 2px solid black;
        }

        /* 🔷 導覽列 */
        .navbar {
            display: flex;
            justify-content: center;
            gap: 60px;
            padding: 15px 0;
            border-bottom: 2px solid black;
            position: sticky;   /* ⭐ 固定在上面 */
            top: 0;
            background: white;
        }

        /* 🔷 文字按鈕 */
        .nav-link {
            text-decoration: none;
            color: black;
            font-size: 18px;
            position: relative;
            transition: color 0.3s ease;
        }

        /* 🔥 滑過變紅 */
        .nav-link:hover {
            color: red;
        }

        /* 🔥 底線動畫（高級感） */
        .nav-link::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            left: 0;
            bottom: -5px;
            background: red;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* 🔥 當前頁面（active） */
        .active {
            color: red;
            font-weight: bold;
        }

        .active::after {
            width: 100%;
        }
    </style>
</head>

<body>

<div class="header">
    SG4
</div>

<div class="navbar">
    <a class="nav-link active" href="Final.html">Information</a>
    <a class="nav-link" href="quiz.html">Quiz</a>
    <a class="nav-link" href="region.html">Region Info</a>
    <a class="nav-link" href="vote.html">Vote</a>
</div>

</body>
</html>
