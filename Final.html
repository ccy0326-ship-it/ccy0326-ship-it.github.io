<!DOCTYPE html>
<html>
<head>
    <title>SDG 4 Website</title>

    <style>
        html {
            overflow-y: scroll;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f9f9;
        }

        /* 🔷 Header */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: white;
            border-bottom: 2px solid black;
            z-index: 1000;
        }

        .header-inner {
            max-width: 1000px;
            margin: auto;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 36px;
        }

        /* ☰ 按鈕 */
        .menu-btn {
            position: absolute;
            left: 20px;
            font-size: 28px;
            cursor: pointer;
        }

        /* 🔷 Navbar */
        .navbar {
            position: fixed;
            top: 80px;
            width: 100%;
            height: 60px;
            background: white;
            border-bottom: 2px solid black;
            z-index: 999;
        }

        .nav-inner {
            max-width: 1000px;
            margin: auto;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
        }

        .nav-link {
            text-decoration: none;
            color: black;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: red;
        }

        .active {
            color: red;
            font-weight: bold;
        }

        /* 🔷 內容 */
        .content {
            max-width: 1000px;
            margin: 160px auto 0;
            text-align: center;
        }

        /* 🔥 側邊選單 */
        .side-menu {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            padding-top: 80px;
            transition: 0.3s;
            z-index: 2000;
        }

        .side-menu a {
            display: block;
            padding: 15px 25px;
            font-size: 18px;
            text-decoration: none;
            color: black;
        }

        .side-menu a:hover {
            background: #f0f0f0;
            color: red;
        }

        .side-menu.active {
            left: 0;
        }

        /* ❌ 關閉按鈕 */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 20px;
            cursor: pointer;
        }

        /* 🔳 遮罩 */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);

            opacity: 0;
            visibility: hidden;
            transition: 0.3s;

            z-index: 1500;
        }

        #overlay.active {
            opacity: 1;
            visibility: visible;
        }

    </style>
</head>

<body>

<!-- Header -->
<div class="header">
    <div class="header-inner">
        <div class="menu-btn" onclick="openMenu()">☰</div>
        SG4
    </div>
</div>

<!-- Navbar -->
<div class="navbar">
    <div class="nav-inner">
        <a class="nav-link active" href="Final.html">Information</a>
        <a class="nav-link" href="quiz.html">Quiz</a>
        <a class="nav-link" href="region.html">Region Info</a>
        <a class="nav-link" href="vote.html">Vote</a>
    </div>
</div>

<!-- 🔥 側邊選單 -->
<div id="sideMenu" class="side-menu">

    <div class="close-btn" onclick="closeMenu()">✖</div>

    <a href="Final.html">Information</a>
    <a href="quiz.html">Quiz</a>
    <a href="region.html">Region Info</a>
    <a href="vote.html">Vote</a>

</div>

<div id="overlay" onclick="closeMenu()"></div>

<!-- Content -->
<div class="content">
    <h1>Welcome to SDG 4</h1>
    <p>Explore education issues around the world.</p>
</div>

<!-- JS -->
<script>
function openMenu() {
    document.getElementById("sideMenu").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeMenu() {
    document.getElementById("sideMenu").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
