<!DOCTYPE html>
<html>
<head>
    <title>SDG 4</title>

    <style>
        html { overflow-y: scroll; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #222;
        }

        /* 🔷 Header */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: white;
            border-bottom: 1px solid #ccc;
            z-index: 1000;
        }

        .header-inner {
            max-width: 1000px;
            margin: auto;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 28px;
            letter-spacing: 3px;
        }

        /* ☰ */
        .menu-btn {
            position: absolute;
            left: 20px;
            font-size: 26px;
            cursor: pointer;
        }

        /* 🔷 Navbar */
        .navbar {
            position: fixed;
            top: 80px;
            width: 100%;
            height: 60px;
            background: white;
            border-bottom: 1px solid #ccc;
            z-index: 999;
        }

        .nav-inner {
            max-width: 1000px;
            margin: auto;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
        }

        .nav-link {
            text-decoration: none;
            color: #666;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .nav-link:hover { color: black; }

        .active {
            color: black;
            font-weight: bold;
        }

        /* 🔷 Content */
        .content {
            max-width: 900px;
            margin: 180px auto 50px;
            text-align: center;
        }

        .title {
            font-size: 42px;
            letter-spacing: 3px;
            margin-bottom: 20px;

            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.6s forwards;
        }

        .subtitle {
            font-size: 18px;
            color: #555;

            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.6s forwards;
            animation-delay: 0.3s;
        }

        /* 🔥 下方選單（像首頁導覽） */
        .home-links {
            margin-top: 60px;
        }

        .home-item {
            padding: 20px 0;
            border-bottom: 1px solid #ccc;
            font-size: 18px;
            cursor: pointer;

            opacity: 0;
            transform: translateX(-80px);
            animation: slideIn 0.5s forwards;
        }

        .home-item:nth-child(1){animation-delay:0.5s;}
        .home-item:nth-child(2){animation-delay:0.6s;}
        .home-item:nth-child(3){animation-delay:0.7s;}
        .home-item:nth-child(4){animation-delay:0.8s;}

        .home-item:hover {
            transform: translateX(10px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 🔥 側邊選單 */
        .side-menu {
            position: fixed;
            top: 0;
            left: -260px;
            width: 260px;
            height: 100%;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2);
            padding-top: 80px;
            transition: 0.3s;
            z-index: 2000;
        }

        .side-menu.active { left: 0; }

        .side-menu a {
            display: block;
            padding: 15px 25px;
            text-decoration: none;
            color: black;
        }

        .side-menu a:hover {
            background: #f0f0f0;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
        }

        #overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 1500;
        }

        #overlay.active {
            opacity: 1;
            visibility: visible;
        }

    </style>
</head>

<body>

<!-- 🔷 navbar載入 -->
<div id="navbar"></div>

<!-- 🔷 Content -->
<div class="content">

    <div class="title">SDG 4</div>
    <div class="subtitle">Quality Education for Everyone</div>

    <div class="home-links">

        <div class="home-item" onclick="location.href='Final.html'">
            Information
        </div>

        <div class="home-item" onclick="location.href='quiz.html'">
            Quiz
        </div>

        <div class="home-item" onclick="location.href='region.html'">
            Region Info
        </div>

        <div class="home-item" onclick="location.href='vote.html'">
            Vote
        </div>

    </div>

</div>

<!-- 🔷 JS -->
<script>
fetch("navbar.html")
.then(res => res.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});

function openMenu() {
    document.getElementById("sideMenu").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeMenu() {
    document.getElementById("sideMenu").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
