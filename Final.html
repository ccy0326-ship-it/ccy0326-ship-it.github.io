<!DOCTYPE html>
<html>
<head>
    <title>SDG 4</title>

    <style>
        html { overflow-y: scroll; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #222;
        }

        /* 🔷 Content */
        .content {
            max-width: 900px;
            margin: 180px auto 50px;
            text-align: center;
        }

        .title {
            font-size: 42px;
            letter-spacing: 3px;
            margin-bottom: 20px;

            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.6s forwards;
        }

        .subtitle {
            font-size: 18px;
            color: #555;

            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.6s forwards;
            animation-delay: 0.3s;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<!-- 🔷 navbar -->
<div id="navbar"></div>

<!-- 🔷 Content -->
<div class="content">

    <div class="title">SDG 4</div>
    <div class="subtitle">Quality Education for Everyone</div>

</div>

<!-- 🔷 JS -->
<script>
fetch("navbar.html")
.then(res => res.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});

function openMenu() {
    document.getElementById("sideMenu").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeMenu() {
    document.getElementById("sideMenu").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
