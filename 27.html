<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ⭐ 這行是關鍵 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Layout</title>

<style>
body {
  margin: 0;
  background: #4aa3d8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 15px;
  width: 90%;
  max-width: 600px;
  border-radius: 12px;
}

.header {
  background: #a8cf45;
  height: 80px;
  margin-bottom: 10px;
}

.middle {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.box {
  background: #1bb3b3;
  height: 80px;
  flex: 1;
}

.footer {
  display: flex;
  gap: 10px;
}

.small {
  background: #ccc;
  height: 50px;
  flex: 1;
}

/* 小於480px */
@media (max-width: 480px) {

  .middle {
    flex-direction: column;
  }

  .footer {
    flex-wrap: wrap;
  }

  .small {
    width: calc(50% - 5px);
  }
}
</style>

</head>

<body>

<div class="container">

  <div class="header"></div>

  <div class="middle">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </div>

  <div class="footer">
    <div class="small"></div>
    <div class="small"></div>
    <div class="small"></div>
    <div class="small"></div>
  </div>

</div>

</body>
</html>
