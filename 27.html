<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Responsive Layout</title>

<style>
body {
  margin: 0;
  background: #4aa3d8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 外框 */
.container {
  background: white;
  padding: 15px;
  width: 90%;
  max-width: 600px;
  border-radius: 12px;
}

/* 上方 */
.header {
  background: #a8cf45;
  height: 80px;
  margin-bottom: 10px;
}

/* 中間 */
.middle {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.box {
  background: #1bb3b3;
  height: 80px;
  flex: 1;
}

/* 下方 */
.footer {
  display: flex;
  gap: 10px;
}

.small {
  background: #ccc;
  height: 50px;
  flex: 1;
}

/* 🔥 預設 = b圖（大螢幕） */
/* 中間：3欄 */
/* 下方：4欄 */


/* 🔥 小於480px = a圖（直排） */
@media (max-width: 480px) {

  /* 中間改直排 */
  .middle {
    flex-direction: column;
  }

  .box {
    width: 100%;
  }

  /* 下方變2x2 */
  .footer {
    flex-wrap: wrap;
  }

  .small {
    width: calc(50% - 5px);
  }
}
</style>

</head>

<body>

<div class="container">

  <div class="header"></div>

  <div class="middle">
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
  </div>

  <div class="footer">
    <div class="small"></div>
    <div class="small"></div>
    <div class="small"></div>
    <div class="small"></div>
  </div>

</div>

</body>
</html>
